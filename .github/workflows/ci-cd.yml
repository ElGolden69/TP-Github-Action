name: CI/CD Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest ./springboot/app

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Test application with docker compose
        run: |
          docker compose up -d

      - name: Check running containers
        run: |
          docker ps

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for Spring Boot to start..."
          for i in {1..30}; do
            if docker compose exec -T springboot-app curl -s http://localhost:8081/user/all > /dev/null; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Still waiting..."
            sleep 5
          done

          echo "Backend failed to start"
          docker compose logs
          exit 1

      - name: Test frontend -> backend communication
        run: |
          docker compose run --rm angular-app sh -c \
            "apk add --no-cache curl && curl -v http://springboot-app:8081/user/all"
